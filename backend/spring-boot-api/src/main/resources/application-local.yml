spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:stock_mvp}
    username: ${POSTGRES_USER:stock_user}
    password: ${POSTGRES_PASSWORD:stock_password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET:local-development-secret-change-me-please-32}
    expiration-seconds: 28800
