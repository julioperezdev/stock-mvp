services:
  postgres:
    image: postgres:16
    container_name: stock-mvp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stock_mvp}
      POSTGRES_USER: ${POSTGRES_USER:-stock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stock_password}
    ports:
      - "${POSTGRES_PORT_PUBLIC:-5432}:5432"
    volumes:
      - stock_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_user -d stock_mvp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ../backend/spring-boot-api
    container_name: stock-mvp-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-stock_mvp}
      POSTGRES_USER: ${POSTGRES_USER:-stock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stock_password}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-deploying-stock-mvp}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-28800}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    build:
      context: ..
      dockerfile: frontend/angular-app/Dockerfile
    container_name: stock-mvp-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  stock_postgres_data:
