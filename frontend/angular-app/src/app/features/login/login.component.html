<section class="login-page">
  <form class="login-panel" [formGroup]="form" (ngSubmit)="login()">
    <div>
      <span class="brand-mark">S</span>
      <h1>Stock MVP</h1>
      <p>Ingresar al panel de gestion.</p>
    </div>

    @if (errorMessage) {
      <div class="message error">{{ errorMessage }}</div>
    }

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" autocomplete="username" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" autocomplete="current-password" />
    </div>

    <button class="btn" type="submit" [disabled]="loading">
      {{ loading ? 'Ingresando...' : 'Ingresar' }}
    </button>

    <div class="login-help">
      <strong>Usuarios locales</strong>
      <span>admin@stock.local / admin123</span>
      <span>local@stock.local / local123</span>
      <span>fabrica@stock.local / fabrica123</span>
    </div>
  </form>
</section>
